[settings]
; The email address where you want to receive alerts
email = you@gmail.com

; Gmail App Password for the sender account (not your regular password)
; How to get one: https://myaccount.google.com/apppasswords
; Make sure 2-Step Verification is enabled first
app_password = xxxx-xxxx-xxxx-xxxx

; (Optional) If you want alerts sent FROM a different Gmail account, fill these in.
; Leave blank to send from the same account as above.
sender_email =
sender_app_password =

; Date range to watch (YYYY-MM-DD format)
start_date = 2026-10-01
end_date = 2026-10-31
